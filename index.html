<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTATO PRO - Accès</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        body { background:linear-gradient(135deg,#0a0b1e 0%,#1a1c3a 100%); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:20px; }
        .card { background:rgba(255,255,255,0.05); backdrop-filter:blur(10px); border-radius:32px; padding:30px; width:100%; max-width:450px; border:1px solid rgba(255,255,255,0.1); }
        .logo { text-align:center; margin-bottom:20px; }
        .logo h1 { font-size:2rem; background:linear-gradient(135deg,#ad00f1,#00d4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .tabs { display:flex; gap:10px; margin-bottom:25px; }
        .tab-btn { flex:1; background:rgba(255,255,255,0.08); border:none; padding:12px; border-radius:30px; color:#fff; font-weight:600; cursor:pointer; transition:0.3s; }
        .tab-btn.active { background:linear-gradient(135deg,#ad00f1,#00d4ff); }
        .form-container { display:none; }
        .form-container.active { display:block; }
        .input-group { margin-bottom:15px; }
        .input-group label { display:block; color:#a0a0b8; margin-bottom:6px; font-size:0.85rem; }
        .input-group input { width:100%; padding:12px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.15); border-radius:16px; color:#fff; font-size:1rem; }
        .btn { width:100%; padding:12px; background:linear-gradient(135deg,#ad00f1,#00d4ff); border:none; border-radius:30px; color:#fff; font-weight:bold; font-size:1rem; cursor:pointer; transition:0.2s; }
        .btn:hover { transform:translateY(-2px); }
        .error-msg { color:#ff6b6b; font-size:0.85rem; margin-top:10px; text-align:center; }
        .info-text { text-align:center; margin-top:20px; font-size:0.7rem; color:#7a7a9a; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><h1>LOTATO PRO</h1></div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="login">Connexion</button>
        <button class="tab-btn" data-tab="register">Inscription joueur</button>
    </div>

    <!-- Formulaire de connexion (propriétaire ou joueur) -->
    <div id="login-form-container" class="form-container active">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Identifiant</label>
            <input type="text" id="login-identifier" placeholder="Téléphone ou nom d'utilisateur" autocomplete="off">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="login-password" placeholder="Mot de passe">
        </div>
        <button class="btn" id="login-btn">Se connecter</button>
        <div id="login-error" class="error-msg"></div>
        <div class="info-text"><i class="fas fa-shield-alt"></i> Propriétaire : admin / admin123</div>
    </div>

    <!-- Formulaire d'inscription joueur -->
    <div id="register-form-container" class="form-container">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Nom complet</label>
            <input type="text" id="reg-name" placeholder="Ex: Jean Dupont">
        </div>
        <div class="input-group">
            <label><i class="fas fa-phone"></i> Téléphone (identifiant unique)</label>
            <input type="tel" id="reg-phone" placeholder="509XXXXXXXX">
        </div>
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Mot de passe</label>
            <input type="password" id="reg-password" placeholder="Au moins 4 caractères">
        </div>
        <div class="input-group">
            <label><i class="fas fa-map-marker-alt"></i> Zone (optionnel)</label>
            <input type="text" id="reg-zone" placeholder="Ex: Port-au-Prince">
        </div>
        <button class="btn" id="register-btn">Créer mon compte</button>
        <div id="register-error" class="error-msg"></div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin + '/api'; // utilise la même origine que la page

    // Gestion des onglets
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.form-container').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab}-form-container`).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // Connexion (propriétaire ou joueur)
    document.getElementById('login-btn').addEventListener('click', async () => {
        const identifier = document.getElementById('login-identifier').value.trim();
        const password = document.getElementById('login-password').value;
        const errorDiv = document.getElementById('login-error');

        if (!identifier || !password) {
            errorDiv.innerText = 'Veuillez remplir tous les champs';
            return;
        }

        errorDiv.innerText = 'Connexion en cours...';

        try {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier, password })
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                errorDiv.innerText = data.error || 'Identifiants incorrects';
                return;
            }
            // Stocker le token
            localStorage.setItem('auth_token', data.token);
            // Rediriger selon le rôle
            if (data.role === 'owner') {
                window.location.href = 'owner.html';
            } else if (data.role === 'player') {
                localStorage.setItem('player_id', data.playerId);
                localStorage.setItem('player_name', data.name);
                window.location.href = 'player.html';
            } else {
                errorDiv.innerText = 'Rôle inconnu';
            }
        } catch (err) {
            errorDiv.innerText = 'Erreur de connexion au serveur';
        }
    });

    // Inscription joueur
    document.getElementById('register-btn').addEventListener('click', async () => {
        const name = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const password = document.getElementById('reg-password').value;
        const zone = document.getElementById('reg-zone').value.trim();
        const errorDiv = document.getElementById('register-error');

        if (!name || !phone || !password) {
            errorDiv.innerText = 'Nom, téléphone et mot de passe requis';
            return;
        }
        if (password.length < 4) {
            errorDiv.innerText = 'Le mot de passe doit comporter au moins 4 caractères';
            return;
        }

        errorDiv.innerText = 'Inscription en cours...';

        try {
            const response = await fetch(`${API_BASE}/auth/player/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, phone, password, zone })
            });
            const data = await response.json();
            if (!response.ok || !data.success) {
                errorDiv.innerText = data.error || 'Échec de l\'inscription';
                return;
            }
            // Inscription réussie : on connecte directement
            localStorage.setItem('auth_token', data.token);
            localStorage.setItem('player_id', data.playerId);
            localStorage.setItem('player_name', data.name);
            window.location.href = 'player.html';
        } catch (err) {
            errorDiv.innerText = 'Erreur réseau';
        }
    });
</script>
</body>
</html>
